AWSTemplateFormatVersion: '2010-09-09'
Description: >
  o11y Game Day - EKS infrastructure for team deployments with namespace isolation

Parameters:
  ClusterName:
    Type: String
    Description: EKS cluster name
    Default: gameday-otel-demo

  TeamCount:
    Type: Number
    Description: Number of teams (namespaces to create)
    Default: 5
    MinValue: 1
    MaxValue: 20

  SplunkAccessToken:
    Type: String
    Description: Splunk Observability Cloud access token
    NoEcho: true

  SplunkRealm:
    Type: String
    Description: Splunk Observability Cloud realm
    Default: jp0

  KubernetesVersion:
    Type: String
    Description: Kubernetes version
    Default: "1.31"
    AllowedValues:
      - "1.31"
      - "1.30"
      - "1.29"

  NodeInstanceType:
    Type: String
    Description: EC2 instance type for EKS nodes
    Default: t3.xlarge
    AllowedValues:
      - t3.large
      - t3.xlarge
      - t3.2xlarge
      - m5.large
      - m5.xlarge
      - m5.2xlarge

  NodeGroupDesiredSize:
    Type: Number
    Description: Desired number of nodes
    Default: 3
    MinValue: 2
    MaxValue: 10

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: EKS Configuration
        Parameters:
          - ClusterName
          - KubernetesVersion
          - NodeInstanceType
          - NodeGroupDesiredSize
      - Label:
          default: Game Day Configuration
        Parameters:
          - TeamCount
      - Label:
          default: Splunk Configuration
        Parameters:
          - SplunkAccessToken
          - SplunkRealm

Resources:
  # VPC for EKS
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${ClusterName}-vpc
        - Key: splunkit_data_classification
          Value: public
        - Key: splunkit_environment_type
          Value: non-prd
        - Key: Project
          Value: o11y-gameday

  # Internet Gateway
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ClusterName}-igw
        - Key: splunkit_data_classification
          Value: public
        - Key: splunkit_environment_type
          Value: non-prd

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # Public Subnets
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ClusterName}-public-1
        - Key: kubernetes.io/role/elb
          Value: "1"
        - Key: splunkit_data_classification
          Value: public
        - Key: splunkit_environment_type
          Value: non-prd

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ClusterName}-public-2
        - Key: kubernetes.io/role/elb
          Value: "1"
        - Key: splunkit_data_classification
          Value: public
        - Key: splunkit_environment_type
          Value: non-prd

  # Route Table
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${ClusterName}-public-rt
        - Key: splunkit_data_classification
          Value: public
        - Key: splunkit_environment_type
          Value: non-prd

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # EKS Cluster Role
  EKSClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ClusterName}-cluster-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
        - arn:aws:iam::aws:policy/AmazonEKSVPCResourceController
      Tags:
        - Key: splunkit_data_classification
          Value: public
        - Key: splunkit_environment_type
          Value: non-prd

  # EKS Node Role
  EKSNodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ClusterName}-node-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: splunkit_data_classification
          Value: public
        - Key: splunkit_environment_type
          Value: non-prd

  # EKS Cluster
  EKSCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Ref ClusterName
      Version: !Ref KubernetesVersion
      RoleArn: !GetAtt EKSClusterRole.Arn
      ResourcesVpcConfig:
        SubnetIds:
          - !Ref PublicSubnet1
          - !Ref PublicSubnet2
        EndpointPublicAccess: true
        EndpointPrivateAccess: true
      Tags:
        - Key: splunkit_data_classification
          Value: public
        - Key: splunkit_environment_type
          Value: non-prd
        - Key: Project
          Value: o11y-gameday

  # EKS Node Group
  EKSNodeGroup:
    Type: AWS::EKS::Nodegroup
    DependsOn: EKSCluster
    Properties:
      ClusterName: !Ref ClusterName
      NodegroupName: !Sub ${ClusterName}-nodegroup
      NodeRole: !GetAtt EKSNodeRole.Arn
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      ScalingConfig:
        DesiredSize: !Ref NodeGroupDesiredSize
        MinSize: 2
        MaxSize: 10
      InstanceTypes:
        - !Ref NodeInstanceType
      AmiType: AL2023_x86_64_STANDARD
      Tags:
        splunkit_data_classification: public
        splunkit_environment_type: non-prd
        Project: o11y-gameday

Outputs:
  ClusterName:
    Description: EKS Cluster Name
    Value: !Ref EKSCluster
    Export:
      Name: !Sub ${AWS::StackName}-ClusterName

  ClusterEndpoint:
    Description: EKS Cluster Endpoint
    Value: !GetAtt EKSCluster.Endpoint
    Export:
      Name: !Sub ${AWS::StackName}-ClusterEndpoint

  ClusterArn:
    Description: EKS Cluster ARN
    Value: !GetAtt EKSCluster.Arn
    Export:
      Name: !Sub ${AWS::StackName}-ClusterArn

  VpcId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub ${AWS::StackName}-VpcId

  UpdateKubeconfigCommand:
    Description: Command to update kubeconfig
    Value: !Sub aws eks update-kubeconfig --name ${ClusterName} --region ${AWS::Region}
