<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>o11y Game Day - 運営ダッシュボード</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      min-height: 100vh;
      color: #fff;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 30px;
    }
    h1 {
      font-size: 1.8rem;
      color: #00d4ff;
    }
    .refresh-btn {
      padding: 10px 20px;
      background: rgba(0,212,255,0.2);
      color: #00d4ff;
      border: 1px solid #00d4ff;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .refresh-btn:hover {
      background: rgba(0,212,255,0.3);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }
    .stat-value {
      font-size: 2.5rem;
      font-weight: bold;
      color: #00ff88;
    }
    .stat-label {
      color: rgba(255,255,255,0.6);
      margin-top: 5px;
    }
    .section-title {
      font-size: 1.3rem;
      margin-bottom: 15px;
      color: #00d4ff;
    }
    .scoreboard {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 30px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    th {
      background: rgba(0,212,255,0.1);
      color: #00d4ff;
      font-weight: 600;
    }
    tr:hover {
      background: rgba(255,255,255,0.03);
    }
    .rank {
      font-weight: bold;
      font-size: 1.2rem;
    }
    .rank-1 { color: #ffd700; }
    .rank-2 { color: #c0c0c0; }
    .rank-3 { color: #cd7f32; }
    .stage-badge {
      padding: 3px 10px;
      border-radius: 15px;
      font-size: 0.8rem;
      background: #ff6b6b;
    }
    .question-progress {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 15px;
    }
    .progress-card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 8px;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .progress-service {
      color: #5c6bc0;
      font-weight: bold;
    }
    .progress-bar-container {
      background: rgba(255,255,255,0.1);
      border-radius: 5px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar {
      background: linear-gradient(90deg, #00d4ff, #00ff88);
      height: 100%;
      transition: width 0.5s;
    }
    .progress-text {
      margin-top: 5px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }
    .action-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .action-btn.primary {
      background: #00d4ff;
      color: #000;
    }
    .action-btn.secondary {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .action-btn:hover {
      opacity: 0.8;
    }
    .team-actions {
      display: flex;
      gap: 5px;
    }
    .team-actions button {
      padding: 5px 10px;
      font-size: 0.75rem;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    .team-actions .reset {
      background: #ff6b6b;
      color: #fff;
    }
    #last-update {
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
    }
    .create-team-form {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 30px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .create-team-form input {
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      flex: 1;
    }
    .create-team-form button {
      padding: 10px 20px;
      background: #00ff88;
      color: #000;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    /* 認証ダイアログ */
    .auth-overlay {
      position: fixed; top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .auth-form {
      background: #1a1a2e; padding: 40px; border-radius: 15px;
      text-align: center; min-width: 350px;
    }
    .auth-form h2 { color: #00d4ff; margin-bottom: 20px; }
    .auth-form input {
      width: 100%; padding: 12px; border: none; border-radius: 5px;
      background: rgba(255,255,255,0.1); color: #fff; font-size: 1rem;
      margin-bottom: 15px;
    }
    .auth-form button {
      width: 100%; padding: 12px; background: #00d4ff; color: #000;
      border: none; border-radius: 5px; font-weight: bold; cursor: pointer;
      font-size: 1rem;
    }
    .auth-form .skip-btn {
      background: transparent; color: rgba(255,255,255,0.5);
      margin-top: 10px; font-size: 0.85rem;
    }
    /* ゲーム状態バナー */
    .game-banner {
      padding: 15px 20px; border-radius: 10px; margin-bottom: 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .game-banner.waiting { background: rgba(255,193,7,0.2); border: 1px solid #ffc107; }
    .game-banner.active { background: rgba(0,255,136,0.2); border: 1px solid #00ff88; }
    .game-banner.finished { background: rgba(255,107,107,0.2); border: 1px solid #ff6b6b; }
    .game-banner .state-text { font-size: 1.1rem; font-weight: bold; }
    .game-banner .elapsed { color: rgba(255,255,255,0.7); font-size: 0.9rem; }
    .game-controls { display: flex; gap: 10px; }
    .game-controls button {
      padding: 8px 20px; border: none; border-radius: 5px;
      cursor: pointer; font-weight: bold; font-size: 0.9rem;
    }
    .btn-start { background: #00ff88; color: #000; }
    .btn-stop { background: #ff6b6b; color: #fff; }
    .btn-reset { background: rgba(255,255,255,0.2); color: #fff; }
    .team-actions .delete-btn {
      background: #dc3545; color: #fff;
    }
  </style>
</head>
<body>
  <!-- 認証ダイアログ -->
  <div id="auth-overlay" class="auth-overlay" style="display:none;">
    <div class="auth-form">
      <h2>管理者ログイン</h2>
      <input type="password" id="admin-password" placeholder="管理者パスワード" onkeypress="if(event.key==='Enter')doLogin()">
      <button onclick="doLogin()">ログイン</button>
      <button class="skip-btn" onclick="skipLogin()">パスワード未設定の場合スキップ</button>
    </div>
  </div>

  <div class="container">
    <header>
      <h1>o11y Game Day - 運営ダッシュボード</h1>
      <div>
        <span id="last-update">-</span>
        <button class="refresh-btn" onclick="loadData()">更新</button>
      </div>
    </header>

    <!-- ゲーム状態バナー -->
    <div id="game-banner" class="game-banner waiting">
      <div>
        <span class="state-text" id="game-state-text">待機中</span>
        <span class="elapsed" id="game-elapsed"></span>
      </div>
      <div class="game-controls">
        <button class="btn-start" id="btn-start" onclick="startGame()">ゲーム開始</button>
        <button class="btn-stop" id="btn-stop" onclick="stopGame()" style="display:none;">ゲーム終了</button>
        <button class="btn-reset" id="btn-reset" onclick="resetGame()" style="display:none;">リセット</button>
      </div>
    </div>

    <div class="stats-grid" id="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-teams">-</div>
        <div class="stat-label">チーム数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-correct">-</div>
        <div class="stat-label">正解数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-avg-score">-</div>
        <div class="stat-label">平均スコア</div>
      </div>
    </div>

    <div class="create-team-form">
      <input type="text" id="new-team-name" placeholder="新しいチーム名">
      <button onclick="createTeam()">チーム作成</button>
    </div>

    <div class="actions">
      <button class="action-btn secondary" onclick="recalculateScores()">スコア再計算</button>
    </div>

    <h2 class="section-title">スコアボード</h2>
    <div class="scoreboard">
      <table>
        <thead>
          <tr>
            <th>順位</th>
            <th>チーム名</th>
            <th>スコア</th>
            <th>正解数</th>
            <th>最終更新</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="scoreboard-body">
        </tbody>
      </table>
    </div>

    <h2 class="section-title">問題別正解率</h2>
    <div class="question-progress" id="question-progress">
    </div>
  </div>

  <script>
    let autoRefreshInterval = null;
    let adminToken = null;

    // 認証ヘッダーを返すヘルパー
    function authHeaders(extra = {}) {
      const h = { 'Content-Type': 'application/json', ...extra };
      if (adminToken) h['Authorization'] = `Bearer ${adminToken}`;
      return h;
    }

    // 認証付きfetch
    async function authFetch(url, opts = {}) {
      opts.headers = authHeaders(opts.headers || {});
      return fetch(url, opts);
    }

    // ログイン処理
    function doLogin() {
      adminToken = document.getElementById('admin-password').value;
      document.cookie = `admin_token=${adminToken};path=/`;
      document.getElementById('auth-overlay').style.display = 'none';
      loadData();
    }
    function skipLogin() {
      adminToken = null;
      document.getElementById('auth-overlay').style.display = 'none';
      loadData();
    }

    // ゲーム制御
    async function loadGameState() {
      try {
        const r = await fetch('/api/game/state');
        const data = await r.json();
        const banner = document.getElementById('game-banner');
        const stateText = document.getElementById('game-state-text');
        const elapsed = document.getElementById('game-elapsed');
        banner.className = 'game-banner ' + data.state;
        const labels = { waiting: '待機中', active: 'ゲーム進行中', finished: '終了' };
        stateText.textContent = labels[data.state] || data.state;
        elapsed.textContent = data.state === 'active' ? `(経過: ${Math.floor(data.elapsed_minutes)}分)` : '';
        document.getElementById('btn-start').style.display = data.state === 'waiting' ? '' : 'none';
        document.getElementById('btn-stop').style.display = data.state === 'active' ? '' : 'none';
        document.getElementById('btn-reset').style.display = data.state !== 'waiting' ? '' : 'none';
      } catch(e) { console.error('Game state error:', e); }
    }
    async function startGame() {
      if (!confirm('ゲームを開始しますか？全チームの開始時刻がリセットされます。')) return;
      await authFetch('/api/admin/game/start', { method: 'POST' });
      loadGameState(); loadData();
    }
    async function stopGame() {
      if (!confirm('ゲームを終了しますか？')) return;
      await authFetch('/api/admin/game/stop', { method: 'POST' });
      loadGameState(); loadData();
    }
    async function resetGame() {
      if (!confirm('ゲーム状態を待機中に戻しますか？')) return;
      await authFetch('/api/admin/game/reset', { method: 'POST' });
      loadGameState(); loadData();
    }

    // チーム削除
    async function deleteTeam(teamId) {
      if (!confirm(`${teamId} を削除しますか？関連する回答データもすべて削除されます。`)) return;
      try {
        const r = await authFetch(`/api/teams/${teamId}`, { method: 'DELETE' });
        if (r.ok) loadData();
        else alert('削除に失敗しました');
      } catch(e) { console.error('Delete error:', e); alert('エラーが発生しました'); }
    }

    async function loadData() {
      try {
        // Load scoreboard
        const scoreboardResponse = await authFetch('/api/admin/scoreboard');
        if (scoreboardResponse.status === 401) {
          document.getElementById('auth-overlay').style.display = 'flex';
          return;
        }
        const scoreboardData = await scoreboardResponse.json();
        renderScoreboard(scoreboardData);

        loadGameState();

        // Load stats
        const statsResponse = await authFetch('/api/admin/stats');
        const statsData = await statsResponse.json();
        renderStats(statsData);

        document.getElementById('last-update').textContent =
          `最終更新: ${new Date().toLocaleTimeString('ja-JP')}`;
      } catch (error) {
        console.error('Error loading data:', error);
      }
    }

    function renderStats(stats) {
      document.getElementById('stat-teams').textContent = stats.total_teams;
      document.getElementById('stat-correct').textContent = stats.total_correct_answers;
      document.getElementById('stat-avg-score').textContent = stats.average_score;
      // Render question progress
      const container = document.getElementById('question-progress');
      container.innerHTML = stats.question_stats.map(q => `
        <div class="progress-card">
          <div class="progress-header">
            <span class="progress-service">${q.service}</span>
            <span>${q.completion_rate}%</span>
          </div>
          <div class="progress-bar-container">
            <div class="progress-bar" style="width: ${q.completion_rate}%"></div>
          </div>
          <div class="progress-text">${q.flag_name === 'none' ? '(基本操作)' : q.flag_name} - ${q.teams_completed}/${stats.total_teams} チーム正解</div>
        </div>
      `).join('');
    }

    function renderScoreboard(data) {
      const tbody = document.getElementById('scoreboard-body');
      tbody.innerHTML = data.teams.map(team => `
        <tr>
          <td class="rank rank-${team.rank <= 3 ? team.rank : ''}">${team.rank}</td>
          <td>${team.team_name}<br><small style="color:#888">${team.team_id}</small></td>
          <td style="font-weight:bold;color:#00ff88">${team.total_score}</td>
          <td>${team.questions_correct}</td>
          <td><small>${team.last_activity ? new Date(team.last_activity).toLocaleString('ja-JP') : '-'}</small></td>
          <td>
            <div class="team-actions">
              <button class="reset" onclick="resetTeam('${team.team_id}')">リセット</button>
              <button class="delete-btn" onclick="deleteTeam('${team.team_id}')">削除</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    async function createTeam() {
      const name = document.getElementById('new-team-name').value.trim();
      if (!name) {
        alert('チーム名を入力してください');
        return;
      }

      try {
        const response = await fetch('/api/teams', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ team_name: name })
        });

        if (response.ok) {
          document.getElementById('new-team-name').value = '';
          loadData();
        } else {
          alert('チームの作成に失敗しました');
        }
      } catch (error) {
        console.error('Error creating team:', error);
        alert('エラーが発生しました');
      }
    }

    async function resetTeam(teamId) {
      if (!confirm(`${teamId}の進行状況をリセットしますか？`)) return;

      try {
        await authFetch(`/api/admin/teams/${teamId}/reset`, { method: 'POST' });
        loadData();
      } catch (error) {
        console.error('Error resetting team:', error);
      }
    }

    async function recalculateScores() {
      try {
        await authFetch('/api/admin/recalculate-scores', { method: 'POST' });
        loadData();
        alert('スコアを再計算しました');
      } catch (error) {
        console.error('Error recalculating scores:', error);
      }
    }

    // Initial load
    loadData();

    // Auto refresh every 10 seconds
    autoRefreshInterval = setInterval(loadData, 10000);
  </script>
</body>
</html>
