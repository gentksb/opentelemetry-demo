AWSTemplateFormatVersion: '2010-09-09'
Description: >
  o11y Game Day Admin App - ECS Express Mode + DynamoDB

Parameters:
  StackSuffix:
    Type: String
    Default: ""
    Description: "Resource name suffix including dash (e.g. '-event1'). Empty for no suffix."

  ContainerImage:
    Type: String
    Description: Container image URI for the admin app (e.g. 123456789012.dkr.ecr.ap-northeast-1.amazonaws.com/gameday-admin:latest)

  CreateDynamoDB:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Set to true to create DynamoDB tables (false if they already exist in another stack)

  ClusterName:
    Type: String
    Default: ""
    Description: Kind cluster name for deployment.environment naming (e.g. gameday-kind)

  SplunkRealm:
    Type: String
    Default: jp0
    Description: Splunk realm for O11y Cloud links

  AdminPassword:
    Type: String
    Default: ""
    NoEcho: true
    Description: Admin API password (leave empty to disable auth)

  ImageVersion:
    Type: String
    Default: "1"
    Description: Increment to force ECS task definition update when using latest tag

  SplunkAccessToken:
    Type: String
    Default: ""
    NoEcho: true
    Description: Splunk access token for APM/Metrics ingest (INGEST scope)

  AppVersion:
    Type: String
    Default: "dev"
    Description: Application version (git SHA) injected as service.version tag

  OrgTag1Key:
    Type: String
    Default: ""
    Description: "Organization tag #1 key (pass-through to ECS Express Mode managed resources for SCP compliance)"

  OrgTag1Value:
    Type: String
    Default: ""
    Description: "Organization tag #1 value"

  OrgTag2Key:
    Type: String
    Default: ""
    Description: "Organization tag #2 key"

  OrgTag2Value:
    Type: String
    Default: ""
    Description: "Organization tag #2 value"

Conditions:
  ShouldCreateDynamoDB: !Equals [!Ref CreateDynamoDB, "true"]
  HasOrgTag1: !Not [!Equals [!Ref OrgTag1Key, ""]]
  HasOrgTag2: !Not [!Equals [!Ref OrgTag2Key, ""]]

Resources:
  # ============================================================
  # DynamoDB Tables (conditional - skip if already exist)
  # ============================================================
  TeamsTable:
    Type: AWS::DynamoDB::Table
    Condition: ShouldCreateDynamoDB
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub gameday-teams${StackSuffix}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: team_id
          AttributeType: S
      KeySchema:
        - AttributeName: team_id
          KeyType: HASH
      Tags:
        - Key: Project
          Value: o11y-gameday

  AnswersTable:
    Type: AWS::DynamoDB::Table
    Condition: ShouldCreateDynamoDB
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub gameday-answers${StackSuffix}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: team_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: team_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: o11y-gameday

  QuestionsTable:
    Type: AWS::DynamoDB::Table
    Condition: ShouldCreateDynamoDB
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub gameday-questions${StackSuffix}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: question_id
          KeyType: HASH
      Tags:
        - Key: Project
          Value: o11y-gameday

  SettingsTable:
    Type: AWS::DynamoDB::Table
    Condition: ShouldCreateDynamoDB
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub gameday-settings${StackSuffix}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: setting_key
          AttributeType: S
      KeySchema:
        - AttributeName: setting_key
          KeyType: HASH
      Tags:
        - Key: Project
          Value: o11y-gameday

  # ============================================================
  # IAM Roles
  # ============================================================

  # Task Execution Role (for ECR pull, CloudWatch Logs)
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub gameday-admin-task-exec${StackSuffix}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # Task Role (for DynamoDB access from the application)
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub gameday-admin-task${StackSuffix}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/gameday-teams${StackSuffix}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/gameday-answers${StackSuffix}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/gameday-questions${StackSuffix}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/gameday-settings${StackSuffix}

  # Infrastructure Role (Express Mode: manages ALB, SG, ACM, auto-scaling)
  InfrastructureRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub gameday-admin-infra${StackSuffix}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAccessToECSForInfrastructureManagement
            Effect: Allow
            Principal:
              Service: ecs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSInfrastructureRoleforExpressGatewayServices

  # ============================================================
  # ECS Express Gateway Service
  # ============================================================
  AdminAppService:
    Type: AWS::ECS::ExpressGatewayService
    DependsOn:
      - TaskExecutionRole
      - InfrastructureRole
      - TaskRole
    Properties:
      ServiceName: !Sub gameday-admin${StackSuffix}
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      InfrastructureRoleArn: !GetAtt InfrastructureRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      Cpu: "256"
      Memory: "512"
      HealthCheckPath: /health
      PrimaryContainer:
        Image: !Ref ContainerImage
        ContainerPort: 3000
        Environment:
          - Name: NODE_ENV
            Value: production
          - Name: PORT
            Value: "3000"
          - Name: AWS_REGION
            Value: !Ref AWS::Region
          - Name: TEAMS_TABLE
            Value: !Sub gameday-teams${StackSuffix}
          - Name: ANSWERS_TABLE
            Value: !Sub gameday-answers${StackSuffix}
          - Name: QUESTIONS_TABLE
            Value: !Sub gameday-questions${StackSuffix}
          - Name: SETTINGS_TABLE
            Value: !Sub gameday-settings${StackSuffix}
          - Name: CLUSTER_NAME
            Value: !Ref ClusterName
          - Name: SPLUNK_REALM
            Value: !Ref SplunkRealm
          - Name: ADMIN_PASSWORD
            Value: !Ref AdminPassword
          - Name: IMAGE_VERSION
            Value: !Ref ImageVersion
          - Name: SPLUNK_ACCESS_TOKEN
            Value: !Ref SplunkAccessToken
          - Name: OTEL_SERVICE_NAME
            Value: gameday-admin
          - Name: OTEL_RESOURCE_ATTRIBUTES
            Value: !Sub "deployment.environment=z-gameday-admin,service.version=${AppVersion}"
      ScalingTarget:
        MinTaskCount: 1
        MaxTaskCount: 1
        AutoScalingMetric: AVERAGE_CPU
        AutoScalingTargetValue: 70
      Tags:
        - Key: Project
          Value: o11y-gameday
        - !If
          - HasOrgTag1
          - Key: !Ref OrgTag1Key
            Value: !Ref OrgTag1Value
          - !Ref AWS::NoValue
        - !If
          - HasOrgTag2
          - Key: !Ref OrgTag2Key
            Value: !Ref OrgTag2Value
          - !Ref AWS::NoValue

Outputs:
  # DynamoDB
  TeamsTableName:
    Description: DynamoDB Teams Table Name
    Value: !Sub gameday-teams${StackSuffix}

  AnswersTableName:
    Description: DynamoDB Answers Table Name
    Value: !Sub gameday-answers${StackSuffix}

  QuestionsTableName:
    Description: DynamoDB Questions Table Name
    Value: !Sub gameday-questions${StackSuffix}

  # ECS Express Mode
  ServiceArn:
    Description: ECS Express Service ARN
    Value: !GetAtt AdminAppService.ServiceArn

  ServiceEndpoint:
    Description: Admin App URL (auto-generated HTTPS endpoint)
    Value: !GetAtt AdminAppService.Endpoint

  TaskRoleArn:
    Description: ECS Task Role ARN
    Value: !GetAtt TaskRole.Arn
