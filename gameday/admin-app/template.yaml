AWSTemplateFormatVersion: '2010-09-09'
Description: >
  o11y Game Day Admin App - ECS Express Mode + DynamoDB

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod

  ContainerImage:
    Type: String
    Description: Container image URI for the admin app (e.g. 123456789012.dkr.ecr.ap-northeast-1.amazonaws.com/gameday-admin:latest)

  CreateDynamoDB:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Set to true to create DynamoDB tables (false if they already exist in another stack)

  ClusterName:
    Type: String
    Default: ""
    Description: Kind cluster name for deployment.environment naming (e.g. gameday-kind)

  SplunkRealm:
    Type: String
    Default: jp0
    Description: Splunk realm for O11y Cloud links

  AdminPassword:
    Type: String
    Default: ""
    NoEcho: true
    Description: Admin API password (leave empty to disable auth)

  ImageVersion:
    Type: String
    Default: "1"
    Description: Increment to force ECS task definition update when using latest tag

Conditions:
  ShouldCreateDynamoDB: !Equals [!Ref CreateDynamoDB, "true"]

Resources:
  # ============================================================
  # DynamoDB Tables (conditional - skip if already exist)
  # ============================================================
  TeamsTable:
    Type: AWS::DynamoDB::Table
    Condition: ShouldCreateDynamoDB
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub gameday-teams-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: team_id
          AttributeType: S
      KeySchema:
        - AttributeName: team_id
          KeyType: HASH
      Tags:
        - Key: splunkit_data_classification
          Value: public
        - Key: splunkit_environment_type
          Value: non-prd
        - Key: Project
          Value: o11y-gameday

  AnswersTable:
    Type: AWS::DynamoDB::Table
    Condition: ShouldCreateDynamoDB
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub gameday-answers-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: team_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: team_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      Tags:
        - Key: splunkit_data_classification
          Value: public
        - Key: splunkit_environment_type
          Value: non-prd
        - Key: Project
          Value: o11y-gameday

  QuestionsTable:
    Type: AWS::DynamoDB::Table
    Condition: ShouldCreateDynamoDB
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub gameday-questions-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: question_id
          KeyType: HASH
      Tags:
        - Key: splunkit_data_classification
          Value: public
        - Key: splunkit_environment_type
          Value: non-prd
        - Key: Project
          Value: o11y-gameday

  # ============================================================
  # IAM Roles
  # ============================================================

  # Task Execution Role (for ECR pull, CloudWatch Logs)
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub gameday-admin-task-exec-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: splunkit_data_classification
          Value: public
        - Key: splunkit_environment_type
          Value: non-prd

  # Task Role (for DynamoDB access from the application)
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub gameday-admin-task-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/gameday-teams-${Environment}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/gameday-answers-${Environment}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/gameday-questions-${Environment}
      Tags:
        - Key: splunkit_data_classification
          Value: public
        - Key: splunkit_environment_type
          Value: non-prd

  # Infrastructure Role (Express Mode: manages ALB, SG, ACM, auto-scaling)
  InfrastructureRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub gameday-admin-infra-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAccessToECSForInfrastructureManagement
            Effect: Allow
            Principal:
              Service: ecs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSInfrastructureRoleforExpressGatewayServices
      Tags:
        - Key: splunkit_data_classification
          Value: public
        - Key: splunkit_environment_type
          Value: non-prd

  # ============================================================
  # ECS Express Gateway Service
  # ============================================================
  AdminAppService:
    Type: AWS::ECS::ExpressGatewayService
    DependsOn:
      - TaskExecutionRole
      - InfrastructureRole
      - TaskRole
    Properties:
      ServiceName: !Sub gameday-admin-${Environment}
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      InfrastructureRoleArn: !GetAtt InfrastructureRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      Cpu: "256"
      Memory: "512"
      HealthCheckPath: /health
      PrimaryContainer:
        Image: !Ref ContainerImage
        ContainerPort: 3000
        Environment:
          - Name: NODE_ENV
            Value: production
          - Name: PORT
            Value: "3000"
          - Name: AWS_REGION
            Value: !Ref AWS::Region
          - Name: TEAMS_TABLE
            Value: !Sub gameday-teams-${Environment}
          - Name: ANSWERS_TABLE
            Value: !Sub gameday-answers-${Environment}
          - Name: QUESTIONS_TABLE
            Value: !Sub gameday-questions-${Environment}
          - Name: CLUSTER_NAME
            Value: !Ref ClusterName
          - Name: SPLUNK_REALM
            Value: !Ref SplunkRealm
          - Name: ADMIN_PASSWORD
            Value: !Ref AdminPassword
          - Name: IMAGE_VERSION
            Value: !Ref ImageVersion
      ScalingTarget:
        MinTaskCount: 1
        MaxTaskCount: 2
        AutoScalingMetric: AVERAGE_CPU
        AutoScalingTargetValue: 70
      Tags:
        - Key: splunkit_data_classification
          Value: public
        - Key: splunkit_environment_type
          Value: non-prd
        - Key: Project
          Value: o11y-gameday

Outputs:
  # DynamoDB
  TeamsTableName:
    Description: DynamoDB Teams Table Name
    Value: !Sub gameday-teams-${Environment}

  AnswersTableName:
    Description: DynamoDB Answers Table Name
    Value: !Sub gameday-answers-${Environment}

  QuestionsTableName:
    Description: DynamoDB Questions Table Name
    Value: !Sub gameday-questions-${Environment}

  # ECS Express Mode
  ServiceArn:
    Description: ECS Express Service ARN
    Value: !GetAtt AdminAppService.ServiceArn

  ServiceEndpoint:
    Description: Admin App URL (auto-generated HTTPS endpoint)
    Value: !GetAtt AdminAppService.Endpoint

  TaskRoleArn:
    Description: ECS Task Role ARN
    Value: !GetAtt TaskRole.Arn
