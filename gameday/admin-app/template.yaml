AWSTemplateFormatVersion: '2010-09-09'
Description: >
  o11y Game Day Admin App - Lambda (Lambda Web Adapter) + DynamoDB

Parameters:
  StackSuffix:
    Type: String
    Default: ""
    Description: "Resource name suffix including dash (e.g. '-event1'). Empty for no suffix."

  ContainerImage:
    Type: String
    Description: Container image URI for the admin app (e.g. 123456789012.dkr.ecr.ap-northeast-1.amazonaws.com/gameday-admin:latest)

  CreateDynamoDB:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Set to true to create DynamoDB tables (false if they already exist in another stack)

  ClusterName:
    Type: String
    Default: ""
    Description: Kind cluster name for deployment.environment naming (e.g. gameday-kind)

  SplunkRealm:
    Type: String
    Default: jp0
    Description: Splunk realm for O11y Cloud links

  AdminPassword:
    Type: String
    Default: ""
    NoEcho: true
    Description: Admin API password (leave empty to disable auth)

  SplunkAccessToken:
    Type: String
    Default: ""
    NoEcho: true
    Description: Splunk access token for APM/Metrics ingest (INGEST scope)

  AppVersion:
    Type: String
    Default: "dev"
    Description: Application version (git SHA) injected as service.version tag

Conditions:
  ShouldCreateDynamoDB: !Equals [!Ref CreateDynamoDB, "true"]

Resources:
  # ============================================================
  # DynamoDB Tables (conditional - skip if already exist)
  # ============================================================
  TeamsTable:
    Type: AWS::DynamoDB::Table
    Condition: ShouldCreateDynamoDB
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub gameday-teams${StackSuffix}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: team_id
          AttributeType: S
      KeySchema:
        - AttributeName: team_id
          KeyType: HASH
      Tags:
        - Key: Project
          Value: o11y-gameday

  AnswersTable:
    Type: AWS::DynamoDB::Table
    Condition: ShouldCreateDynamoDB
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub gameday-answers${StackSuffix}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: team_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: team_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: o11y-gameday

  QuestionsTable:
    Type: AWS::DynamoDB::Table
    Condition: ShouldCreateDynamoDB
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub gameday-questions${StackSuffix}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: question_id
          KeyType: HASH
      Tags:
        - Key: Project
          Value: o11y-gameday

  SettingsTable:
    Type: AWS::DynamoDB::Table
    Condition: ShouldCreateDynamoDB
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub gameday-settings${StackSuffix}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: setting_key
          AttributeType: S
      KeySchema:
        - AttributeName: setting_key
          KeyType: HASH
      Tags:
        - Key: Project
          Value: o11y-gameday

  # ============================================================
  # IAM Role (Lambda execution + DynamoDB access)
  # ============================================================
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub gameday-admin-lambda${StackSuffix}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/gameday-teams${StackSuffix}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/gameday-answers${StackSuffix}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/gameday-questions${StackSuffix}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/gameday-settings${StackSuffix}
      Tags:
        - Key: Project
          Value: o11y-gameday

  # ============================================================
  # Lambda Function (Lambda Web Adapter)
  # ============================================================
  AdminAppFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub gameday-admin${StackSuffix}
      Role: !GetAtt LambdaExecutionRole.Arn
      PackageType: Image
      Code:
        ImageUri: !Ref ContainerImage
      MemorySize: 512
      Timeout: 30
      Environment:
        Variables:
          NODE_ENV: production
          PORT: "3000"
          AWS_REGION: !Ref AWS::Region
          TEAMS_TABLE: !Sub gameday-teams${StackSuffix}
          ANSWERS_TABLE: !Sub gameday-answers${StackSuffix}
          QUESTIONS_TABLE: !Sub gameday-questions${StackSuffix}
          SETTINGS_TABLE: !Sub gameday-settings${StackSuffix}
          CLUSTER_NAME: !Ref ClusterName
          SPLUNK_REALM: !Ref SplunkRealm
          ADMIN_PASSWORD: !Ref AdminPassword
          SPLUNK_ACCESS_TOKEN: !Ref SplunkAccessToken
          OTEL_SERVICE_NAME: gameday-admin
          OTEL_RESOURCE_ATTRIBUTES: !Sub "deployment.environment=z-gameday-admin,service.version=${AppVersion}"
      Tags:
        - Key: Project
          Value: o11y-gameday

  AdminAppFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !Ref AdminAppFunction
      AuthType: NONE
      Cors:
        AllowOrigins:
          - "*"

  FunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AdminAppFunction
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: NONE

Outputs:
  # DynamoDB
  TeamsTableName:
    Description: DynamoDB Teams Table Name
    Value: !Sub gameday-teams${StackSuffix}

  AnswersTableName:
    Description: DynamoDB Answers Table Name
    Value: !Sub gameday-answers${StackSuffix}

  QuestionsTableName:
    Description: DynamoDB Questions Table Name
    Value: !Sub gameday-questions${StackSuffix}

  # Lambda
  FunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt AdminAppFunction.Arn

  FunctionUrl:
    Description: Admin App URL (Lambda Function URL)
    Value: !GetAtt AdminAppFunctionUrl.FunctionUrl

  LambdaRoleArn:
    Description: Lambda Execution Role ARN
    Value: !GetAtt LambdaExecutionRole.Arn
