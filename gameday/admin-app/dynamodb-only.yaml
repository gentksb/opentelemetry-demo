AWSTemplateFormatVersion: '2010-09-09'
Description: >
  o11y Game Day Admin App - DynamoDB tables only (for local development)

Parameters:
  StackSuffix:
    Type: String
    Default: ""
    Description: "Resource name suffix including dash (e.g. '-event1'). Empty for no suffix."

Resources:
  TeamsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub gameday-teams${StackSuffix}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: team_id
          AttributeType: S
      KeySchema:
        - AttributeName: team_id
          KeyType: HASH
      Tags:
        - Key: Project
          Value: o11y-gameday

  AnswersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub gameday-answers${StackSuffix}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: team_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: team_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: o11y-gameday

  QuestionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub gameday-questions${StackSuffix}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: question_id
          KeyType: HASH
      Tags:
        - Key: Project
          Value: o11y-gameday

Outputs:
  TeamsTableName:
    Description: DynamoDB Teams Table Name
    Value: !Ref TeamsTable

  AnswersTableName:
    Description: DynamoDB Answers Table Name
    Value: !Ref AnswersTable

  QuestionsTableName:
    Description: DynamoDB Questions Table Name
    Value: !Ref QuestionsTable
